name: Daily Instagram Post

on:
  schedule:
    - cron: '0 9 * * *' # Runs daily at 09:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "IG_USERNAME=${{ secrets.IG_USERNAME }}" >> .env
          echo "IG_PASSWORD=${{ secrets.IG_PASSWORD }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "CONTENT_NICHE=${{ secrets.CONTENT_NICHE }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}" >> .env

      - name: Run Agent
        run: python main.py

      - name: Save Post History
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_history.json ig_session.json || true
          git diff --cached --quiet || git commit -m "Update post history [skip ci]"
          git push || true
